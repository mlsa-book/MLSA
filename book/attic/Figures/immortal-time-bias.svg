<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 400" font-family="DejaVu Sans">
    <defs>
      <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
        <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
      </filter>
    </defs>

    <!-- ===== immortal-time window (behind treatment row) ===== -->
    <rect x="200" y="220" width="230" height="70" rx="4" fill="#fdf1dd" stroke="#e3b86a" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#sh)"/>
    <text x="315" y="210" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#b9822b">immortal time</text>

    <!-- ============================== CONTROL ROW (y=115, B=99) ============================== -->
    <g stroke="#34495e" stroke-width="2.3" fill="none">
      <circle cx="46" cy="91" r="7.5" fill="#34495e" stroke="none"/>
      <line x1="46" y1="98.5" x2="46" y2="118"/><line x1="35" y1="107" x2="57" y2="107"/>
      <line x1="46" y1="118" x2="37" y2="130"/><line x1="46" y1="118" x2="55" y2="130"/>
    </g>
    <line x1="200" y1="115" x2="360" y2="115" stroke="#2c3e50" stroke-width="2.8"/>
    <!-- stethoscope @200 -->
    <g stroke="#5a6a7a" stroke-width="1.9" fill="none" stroke-linecap="round"><path d="M 191 69 V 80 Q 191 90 200 90 Q 209 90 209 80 V 69"/><line x1="200" y1="90" x2="200" y2="94"/></g>
    <circle cx="200" cy="96" r="4" fill="#5a6a7a"/><circle cx="191" cy="69" r="2.2" fill="#5a6a7a"/><circle cx="209" cy="69" r="2.2" fill="#5a6a7a"/>
    <!-- entry bracket @200 -->
    <path d="M 205 103 Q 194 115 205 127" fill="none" stroke="#2c3e50" stroke-width="3"/>
    <!-- thermometer + death @360 -->
    <rect x="357" y="71" width="6" height="19" rx="3" fill="#fff" stroke="#c0392b" stroke-width="1.7"/><circle cx="360" cy="94" r="5" fill="#c0392b"/><line x1="360" y1="91" x2="360" y2="79" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="360" cy="115" r="6.5" fill="#2c3e50"/>
    <text x="200" y="145" text-anchor="middle" font-size="13.5" fill="#555">diagnosed &amp; enrolled</text>
    <text x="360" y="145" text-anchor="middle" font-size="13.5" fill="#555">dies</text>

    <!-- ============================== TREATMENT ROW (y=255, B=239) ============================== -->
    <g stroke="#34495e" stroke-width="2.3" fill="none">
      <circle cx="46" cy="231" r="7.5" fill="#34495e" stroke="none"/>
      <line x1="46" y1="238.5" x2="46" y2="258"/><line x1="35" y1="247" x2="57" y2="247"/>
      <line x1="46" y1="258" x2="37" y2="270"/><line x1="46" y1="258" x2="55" y2="270"/>
    </g>
    <!-- immortal segment (amber) then at-risk segment (navy) -->
    <line x1="200" y1="255" x2="430" y2="255" stroke="#e3962a" stroke-width="3.2"/>
    <line x1="430" y1="255" x2="680" y2="255" stroke="#2c3e50" stroke-width="2.8"/>
    <!-- stethoscope @200 -->
    <g stroke="#5a6a7a" stroke-width="1.9" fill="none" stroke-linecap="round"><path d="M 191 209 V 220 Q 191 230 200 230 Q 209 230 209 220 V 209"/><line x1="200" y1="230" x2="200" y2="234"/></g>
    <circle cx="200" cy="236" r="4" fill="#5a6a7a"/><circle cx="191" cy="209" r="2.2" fill="#5a6a7a"/><circle cx="209" cy="209" r="2.2" fill="#5a6a7a"/>
    <!-- entry bracket @200 -->
    <path d="M 205 243 Q 194 255 205 267" fill="none" stroke="#2c3e50" stroke-width="3"/>
    <!-- pills @430 -->
    <rect x="420" y="230" width="20" height="9" rx="4.5" fill="#fff" stroke="#5a6a7a" stroke-width="1.7"/><path d="M 424.5 230 a 4.5 4.5 0 0 0 0 9 h 5.5 v -9 z" fill="#cfe3d6"/><line x1="430" y1="230" x2="430" y2="239" stroke="#5a6a7a" stroke-width="1.5"/>
    <!-- thermometer + death @680 -->
    <rect x="677" y="211" width="6" height="19" rx="3" fill="#fff" stroke="#c0392b" stroke-width="1.7"/><circle cx="680" cy="234" r="5" fill="#c0392b"/><line x1="680" y1="231" x2="680" y2="219" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="680" cy="255" r="6.5" fill="#2c3e50"/>
    <text x="200" y="285" text-anchor="middle" font-size="13.5" fill="#555">diagnosed &amp; enrolled</text>
    <text x="430" y="285" text-anchor="middle" font-size="13.5" fill="#555">receives treatment</text>
    <text x="680" y="285" text-anchor="middle" font-size="13.5" fill="#555">dies</text>

    <!-- annotation under the immortal window -->
    <text x="315" y="312" text-anchor="middle" font-size="12.5" font-style="italic" fill="#b9822b">must survive to be classified as "treated" — cannot die here</text>

    <!-- ===== right-side group labels ===== -->
    <text x="845" y="120" font-size="16" font-weight="bold" fill="#2c3e50">Control group</text>
    <text x="845" y="260" font-size="16" font-weight="bold" fill="#2c3e50">Treatment group</text>

    <!-- ===== time axis ===== -->
    <line x1="120" y1="345" x2="806" y2="345" stroke="#2c3e50" stroke-width="2.2"/>
    <polygon points="820,345 806,352 806,338" fill="#2c3e50"/>
    <text x="463" y="367" text-anchor="middle" font-size="15" font-style="italic" fill="#2c3e50">Time</text>

    <!-- ===== legend ===== -->
    <line x1="300" y1="383" x2="342" y2="383" stroke="#e3962a" stroke-width="3.2"/>
    <text x="350" y="388" font-size="14" fill="#444">immortal (guaranteed event-free)</text>
    <line x1="620" y1="383" x2="662" y2="383" stroke="#2c3e50" stroke-width="2.8"/>
    <text x="670" y="388" font-size="14" fill="#444">at risk</text>
  </svg>