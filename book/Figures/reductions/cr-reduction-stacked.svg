<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1820 920" width="1820" height="920" font-family="DejaVu Sans">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Vertical separators at the midpoint between adjacent elements -->
  <line x1="340"    y1="40" x2="340"    y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>
  <line x1="730"    y1="40" x2="730"    y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>
  <line x1="1175"   y1="40" x2="1175"   y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>

  <!-- Step headers -->
  <text x="540"  y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 1</text>
  <text x="540"  y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">stack causes</text>
  <text x="940"  y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 2</text>
  <text x="940"  y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">fit one stacked model</text>
  <text x="1510" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 3</text>
  <text x="1510" y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">combine</text>

  <!-- ===== Original CR data (unlabeled, on the left) ===== -->
  <text x="150" y="416" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Original CR data</text>
  <g filter="url(#ds)">
    <rect x="20"  y="430" width="260" height="48" fill="#F0F2F5" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="20"  y="478" width="260" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="20"  y="522" width="260" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="20"  y="566" width="260" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="20"  y="430" width="260" height="180" fill="none" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="60"  y="462" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">t</text>
  <text x="150" y="462" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">x</text>
  <text x="240" y="462" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">q</text>
  <text x="60"  y="507" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="150" y="507" text-anchor="middle" font-size="28" fill="#2E3440">x₁</text>
  <text x="240" y="507" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="60"  y="551" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="150" y="551" text-anchor="middle" font-size="28" fill="#2E3440">x₂</text>
  <text x="240" y="551" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="60"  y="595" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="150" y="595" text-anchor="middle" font-size="28" fill="#2E3440">x₃</text>
  <text x="240" y="595" text-anchor="middle" font-size="28" fill="#2E3440">0</text>

  <!-- ===== Step 1: Stacked dataset (one big table, rows tinted by cause) ===== -->
  <!-- Layout: 4 cols [70, 90, 80, 80] = 320; centered at (540, 490).
       Spans x ∈ [380, 700]; y_top = 490 - (48 + 6*44)/2 = 334; y_bot = 646 -->
  <text x="540" y="350" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Stacked dataset</text>
  <g filter="url(#ds)">
    <!-- header -->
    <rect x="380" y="364" width="320" height="48" fill="#F0F2F5" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- cause-1 rows (blue tint) -->
    <rect x="380" y="412" width="320" height="44" fill="#DAE7F4" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="380" y="456" width="320" height="44" fill="#DAE7F4" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="380" y="500" width="320" height="44" fill="#DAE7F4" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- cause-2 rows (peach tint) -->
    <rect x="380" y="544" width="320" height="44" fill="#FAE2D0" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="380" y="588" width="320" height="44" fill="#FAE2D0" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="380" y="632" width="320" height="44" fill="#FAE2D0" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- outer frame -->
    <rect x="380" y="364" width="320" height="312" fill="none" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <!-- column centres: t @ 415, x @ 495, c @ 580, δ @ 660 -->
  <text x="415" y="396" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">t</text>
  <text x="495" y="396" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">x</text>
  <text x="580" y="396" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">c</text>
  <text x="660" y="396" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">δ</text>
  <!-- cause-1 rows -->
  <text x="415" y="441" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="495" y="441" text-anchor="middle" font-size="28" fill="#2E3440">x₁</text>
  <text x="580" y="441" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="660" y="441" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="415" y="485" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="495" y="485" text-anchor="middle" font-size="28" fill="#2E3440">x₂</text>
  <text x="580" y="485" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="660" y="485" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="415" y="529" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="495" y="529" text-anchor="middle" font-size="28" fill="#2E3440">x₃</text>
  <text x="580" y="529" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="660" y="529" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <!-- cause-2 rows -->
  <text x="415" y="573" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="495" y="573" text-anchor="middle" font-size="28" fill="#2E3440">x₁</text>
  <text x="580" y="573" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="660" y="573" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="415" y="617" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="495" y="617" text-anchor="middle" font-size="28" fill="#2E3440">x₂</text>
  <text x="580" y="617" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="660" y="617" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="415" y="661" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="495" y="661" text-anchor="middle" font-size="28" fill="#2E3440">x₃</text>
  <text x="580" y="661" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="660" y="661" text-anchor="middle" font-size="28" fill="#2E3440">0</text>

  <!-- ===== Step 2: Single stacked model (centered vertically) ===== -->
  <!-- box 360x260, center (940, 490); spans x ∈ [760, 1120], y ∈ [360, 620] -->
  <g filter="url(#ds)">
    <rect x="760" y="390" width="360" height="260" rx="10" ry="10" fill="#E5E9F0" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="940" y="426" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Stacked model</text>
  <text x="940" y="500" text-anchor="middle" font-size="29" fill="#2E3440">ĥ(τ | x, c)</text>
  <text x="940" y="570" text-anchor="middle" font-size="26" fill="#2E3440">ĥ₁(τ | x) = ĥ(τ | x, c = 1)</text>
  <text x="940" y="610" text-anchor="middle" font-size="26" fill="#2E3440">ĥ₂(τ | x) = ĥ(τ | x, c = 2)</text>

  <!-- ===== Step 3: Combined quantities (same as pipeline) ===== -->
  <g filter="url(#ds)">
    <rect x="1230" y="340" width="560" height="360" rx="10" ry="10" fill="#D4EBD8" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="1510" y="376" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Combined quantities</text>
  <text x="1510" y="485" text-anchor="middle" font-size="29" fill="#2E3440">Ŝ(τ | x) = exp(−Σ_q Ĥ_q(τ | x))</text>
  <text x="1510" y="575" text-anchor="middle" font-size="29" fill="#2E3440">F̂_q(τ | x) = ∫ Ŝ(u⁻| x) ĥ_q(u | x) du</text>

  <!-- ===== Arrows (all horizontal, single flow) ===== -->
  <!-- Arrow 1: Original (286, 490) → Stacked (374, 490) -->
  <line x1="286" y1="520" x2="360" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="374,520 360,513 360,527" fill="#2E3440"/>
  <!-- Arrow 2: Stacked (706, 490) → Model (754, 490) -->
  <line x1="706" y1="520" x2="740" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="754,520 740,513 740,527" fill="#2E3440"/>
  <!-- Arrow 3: Model (1126, 490) → Combined (1224, 490) -->
  <line x1="1126" y1="520" x2="1210" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="1224,520 1210,513 1210,527" fill="#2E3440"/>
</svg>
