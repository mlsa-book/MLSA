  <!-- Arrows. Each block: source -> tip. Per-line: dx, dy, L; ux, uy; perp=(-uy, ux);
       head_len=14, head_w=7; base_centre = tip - head_len*(ux,uy);
       base1 = base_centre + head_w*perp;  base2 = base_centre - head_w*perp.
       Line goes source -> base_centre.  Polygon = "tip base1 base2". -->

