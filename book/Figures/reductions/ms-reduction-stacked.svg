<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1820 920" width="1820" height="920" font-family="DejaVu Sans">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Lane separators -->
  <line x1="385"    y1="40" x2="385"    y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>
  <line x1="782.5"  y1="40" x2="782.5"  y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>
  <line x1="1255"   y1="40" x2="1255"   y2="910" stroke="#E1E5EC" stroke-width="1.2" stroke-dasharray="6 6"/>

  <!-- Step headers -->
  <text x="590"  y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 1</text>
  <text x="590"  y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">stack transitions</text>
  <text x="1010" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 2</text>
  <text x="1010" y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">fit one stacked model</text>
  <text x="1540" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#2E3440">Step 3</text>
  <text x="1540" y="98" text-anchor="middle" font-size="27" font-style="italic" fill="#2E3440">combine</text>

  <!-- Original MS data, centred at (200, 490) -->
  <text x="200" y="394" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Original MS data</text>
  <g filter="url(#ds)">
    <rect x="45" y="408" width="310" height="48" fill="#F0F2F5" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="45" y="456" width="310" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="45" y="500" width="310" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="45" y="544" width="310" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="45" y="588" width="310" height="44" fill="#FFFFFF" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="45" y="408" width="310" height="224" fill="none" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="70"    y="440" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">id</text>
  <text x="127.5" y="440" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">from</text>
  <text x="192.5" y="440" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">to</text>
  <text x="257.5" y="440" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">t</text>
  <text x="322.5" y="440" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">δ</text>
  <!-- subject 1: 0→1 at t=2 -->
  <text x="70"    y="485" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="127.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="192.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="257.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="322.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- subject 1: 1→2 at t=5 -->
  <text x="70"    y="529" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="127.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="192.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="257.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">5</text>
  <text x="322.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- subject 2: 0→2 at t=4 -->
  <text x="70"    y="573" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="127.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="192.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="257.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="322.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- subject 3 (starts in state 1): 1→0 at t=6 -->
  <text x="70"    y="617" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="127.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="192.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="257.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">6</text>
  <text x="322.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">1</text>

  <!-- Stacked dataset at (590, 490): 5 cols [50, 75, 75, 90, 60] = 350; 8 rows.
       Spans x ∈ [415, 765]; y ∈ [290, 690]. Header @ y=290, height 48; rows of 44. -->
  <text x="590" y="306" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Stacked dataset</text>
  <g filter="url(#ds)">
    <rect x="415" y="320" width="350" height="48" fill="#F0F2F5" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- 0→1 rows (blue) -->
    <rect x="415" y="368" width="350" height="44" fill="#DAE7F4" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="415" y="412" width="350" height="44" fill="#DAE7F4" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- 0→2 rows (green) -->
    <rect x="415" y="456" width="350" height="44" fill="#DAEDDC" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="415" y="500" width="350" height="44" fill="#DAEDDC" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- 1→0 rows (lavender) -->
    <rect x="415" y="544" width="350" height="44" fill="#E5DAF0" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="415" y="588" width="350" height="44" fill="#E5DAF0" stroke="#A5ACBA" stroke-width="0.8"/>
    <!-- 1→2 rows (yellow) -->
    <rect x="415" y="632" width="350" height="44" fill="#FAF3D8" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="415" y="676" width="350" height="44" fill="#FAF3D8" stroke="#A5ACBA" stroke-width="0.8"/>
    <rect x="415" y="320" width="350" height="400" fill="none" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <!-- column centres: id @ 440, tstart @ 502.5, tstop @ 577.5, trans @ 660, δ @ 735 -->
  <text x="440"   y="352" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">id</text>
  <text x="502.5" y="352" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">tstart</text>
  <text x="577.5" y="352" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">tstop</text>
  <text x="660"   y="352" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">trans</text>
  <text x="735"   y="352" text-anchor="middle" font-size="28" font-style="italic" fill="#2E3440">δ</text>
  <!-- rows sorted by transition: 0→1, 0→2, 1→0, 1→2 -->
  <!-- Row 1 (0→1 group): subj 1, [0,2], 0→1, δ=1 -->
  <text x="440"   y="397" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="502.5" y="397" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="397" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="660"   y="397" text-anchor="middle" font-size="28" fill="#2E3440">0→1</text>
  <text x="735"   y="397" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- Row 2 (0→1 group): subj 2, [0,4], 0→1, δ=0 -->
  <text x="440"   y="441" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="502.5" y="441" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="441" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="660"   y="441" text-anchor="middle" font-size="28" fill="#2E3440">0→1</text>
  <text x="735"   y="441" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <!-- Row 3 (0→2 group): subj 1, [0,2], 0→2, δ=0 -->
  <text x="440"   y="485" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="502.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="485" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="660"   y="485" text-anchor="middle" font-size="28" fill="#2E3440">0→2</text>
  <text x="735"   y="485" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <!-- Row 4 (0→2 group): subj 2, [0,4], 0→2, δ=1 -->
  <text x="440"   y="529" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="502.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="529" text-anchor="middle" font-size="28" fill="#2E3440">4</text>
  <text x="660"   y="529" text-anchor="middle" font-size="28" fill="#2E3440">0→2</text>
  <text x="735"   y="529" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- Row 5 (1→0 group): subj 1, [2,5], 1→0, δ=0  ← left-truncated entry -->
  <text x="440"   y="573" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="502.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="577.5" y="573" text-anchor="middle" font-size="28" fill="#2E3440">5</text>
  <text x="660"   y="573" text-anchor="middle" font-size="28" fill="#2E3440">1→0</text>
  <text x="735"   y="573" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <!-- Row 6 (1→0 group): subj 3, [0,6], 1→0, δ=1 (subject 3 starts in state 1) -->
  <text x="440"   y="617" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="502.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="617" text-anchor="middle" font-size="28" fill="#2E3440">6</text>
  <text x="660"   y="617" text-anchor="middle" font-size="28" fill="#2E3440">1→0</text>
  <text x="735"   y="617" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- Row 7 (1→2 group): subj 1, [2,5], 1→2, δ=1  ← left-truncated entry -->
  <text x="440"   y="661" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <text x="502.5" y="661" text-anchor="middle" font-size="28" fill="#2E3440">2</text>
  <text x="577.5" y="661" text-anchor="middle" font-size="28" fill="#2E3440">5</text>
  <text x="660"   y="661" text-anchor="middle" font-size="28" fill="#2E3440">1→2</text>
  <text x="735"   y="661" text-anchor="middle" font-size="28" fill="#2E3440">1</text>
  <!-- Row 8 (1→2 group): subj 3, [0,6], 1→2, δ=0 -->
  <text x="440"   y="705" text-anchor="middle" font-size="28" fill="#2E3440">3</text>
  <text x="502.5" y="705" text-anchor="middle" font-size="28" fill="#2E3440">0</text>
  <text x="577.5" y="705" text-anchor="middle" font-size="28" fill="#2E3440">6</text>
  <text x="660"   y="705" text-anchor="middle" font-size="28" fill="#2E3440">1→2</text>
  <text x="735"   y="705" text-anchor="middle" font-size="28" fill="#2E3440">0</text>

  <!-- Stacked model (single learner), centred at (1010, 520). 420×260. -->
  <g filter="url(#ds)">
    <rect x="800" y="390" width="420" height="260" rx="10" ry="10" fill="#E5E9F0" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="1010" y="426" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Stacked model</text>
  <text x="1010" y="500" text-anchor="middle" font-size="29" fill="#2E3440">ĥ(τ | x, trans)</text>
  <text x="1010" y="585" text-anchor="middle" font-size="25" fill="#2E3440">ĥₗₑ(τ | x) = ĥ(τ | x, trans = ℓ→e)</text>

  <!-- Combined quantities, centred at (1540, 520). 500×360. -->
  <g filter="url(#ds)">
    <rect x="1290" y="340" width="500" height="360" rx="10" ry="10" fill="#D4EBD8" stroke="#A5ACBA" stroke-width="1.2"/>
  </g>
  <text x="1540" y="376" text-anchor="middle" font-size="26" font-weight="600" fill="#2E3440">Combined quantities</text>
  <text x="1540" y="485" text-anchor="middle" font-size="29" fill="#2E3440">Ĥₗₑ(τ | x) = ∫ ĥₗₑ(u | x) du</text>
  <text x="1540" y="575" text-anchor="middle" font-size="29" fill="#2E3440">P̂(ζ, τ | x)</text>

  <!-- Arrows (all horizontal). For each: line goes source -> base_centre;
       polygon is "tip base1 base2" with base perpendicular to direction. -->

  <!-- Arrow 1: Original (361, 490) -> Stacked tip (409, 490). dx=48, dy=0.
       base_centre = (395, 490). base1 = (395, 497). base2 = (395, 483). -->
  <line x1="361" y1="520" x2="395" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="409,520 395,513 395,527" fill="#2E3440"/>

  <!-- Arrow 2: Stacked (771, 490) -> Model tip (794, 490). dx=23, dy=0.
       base_centre = (780, 490). base1 = (780, 497). base2 = (780, 483). -->
  <line x1="771" y1="520" x2="780" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="794,520 780,513 780,527" fill="#2E3440"/>

  <!-- Arrow 3: Model right edge (1226, 520) -> Combined tip (1284, 520).
       Model now spans [800,1220], Combined now spans [1290,1790].
       dx=58, dy=0. base_centre = (1270, 520). base1/2 = (1270, 527)/(1270, 513). -->
  <line x1="1226" y1="520" x2="1270" y2="520" stroke="#2E3440" stroke-width="1.8"/>
  <polygon points="1284,520 1270,513 1270,527" fill="#2E3440"/>
</svg>
