<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="840" viewBox="0 0 1500 840" font-family="DejaVu Sans">
    <defs>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
        <feDropShadow dx="1.5" dy="1.5" stdDeviation="2.5" flood-opacity="0.12"/>
      </filter>
    </defs>

    <!-- ===== Panel (a): shared trunk ===== -->
    <text x="80" y="48" font-size="27" font-weight="bold" fill="#222">(a) shared trunk</text>

    <!-- Input x -->
    <circle cx="130" cy="200" r="42" fill="#E8EEF7" stroke="#5B7CA8" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="209" text-anchor="middle" font-size="29" fill="#222">x</text>

    <!-- Hidden layers block -->
    <rect x="250" y="120" width="200" height="160" rx="14" fill="#FFF1D6" stroke="#C99A2C" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="190" text-anchor="middle" font-size="23" font-weight="bold" fill="#333">hidden</text>
    <text x="350" y="216" text-anchor="middle" font-size="23" font-weight="bold" fill="#333">layers</text>

    <!-- Arrow: x -> hidden -->
    <line x1="172" y1="200" x2="234" y2="200" stroke="#6E7787" stroke-width="2"/>
    <polygon points="250,200 234,193 234,207" fill="#6E7787"/>

    <!-- z_mu node -->
    <circle cx="570" cy="140" r="36" fill="white" stroke="#444" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="565" y="141" text-anchor="middle" font-size="28" fill="#222">z</text>
    <text x="575" y="153" text-anchor="start" font-size="20" fill="#222">μ</text>

    <!-- z_sigma node -->
    <circle cx="570" cy="260" r="36" fill="white" stroke="#444" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="565" y="261" text-anchor="middle" font-size="28" fill="#222">z</text>
    <text x="575" y="273" text-anchor="start" font-size="20" fill="#222">σ</text>

    <!-- Arrows: hidden -> z_mu, hidden -> z_sigma -->
    <line x1="450" y1="172" x2="518" y2="147" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="534,142 518,139 521,153" fill="#6E7787"/>

    <line x1="450" y1="228" x2="518" y2="253" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="534,258 521,247 518,261" fill="#6E7787"/>

    <!-- r_mu box -->
    <rect x="690" y="118" width="70" height="44" rx="8" fill="#FFF7C2" stroke="#C4A000" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="720" y="146" text-anchor="middle" font-size="26" fill="#222">r</text>
    <text x="730" y="151" text-anchor="start" font-size="19" fill="#222">μ</text>

    <!-- r_sigma box -->
    <rect x="690" y="238" width="70" height="44" rx="8" fill="#FFF7C2" stroke="#C4A000" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="720" y="266" text-anchor="middle" font-size="26" fill="#222">r</text>
    <text x="730" y="271" text-anchor="start" font-size="19" fill="#222">σ</text>

    <!-- Arrows: z -> r boxes -->
    <line x1="606" y1="140" x2="674" y2="140" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="690,140 674,133 674,147" fill="#6E7787"/>

    <line x1="606" y1="260" x2="674" y2="260" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="690,260 674,253 674,267" fill="#6E7787"/>

    <!-- mu-hat output -->
    <circle cx="870" cy="140" r="36" fill="#E8F5E9" stroke="#3F8A52" stroke-width="2" filter="url(#shadow)"/>
    <text x="870" y="149" text-anchor="middle" font-size="28" fill="#222">μ̂(x)</text>

    <!-- sigma-hat output -->
    <circle cx="870" cy="260" r="36" fill="#E8F5E9" stroke="#3F8A52" stroke-width="2" filter="url(#shadow)"/>
    <text x="870" y="269" text-anchor="middle" font-size="28" fill="#222">σ̂(x)</text>

    <!-- Arrows: r -> outputs -->
    <line x1="760" y1="140" x2="818" y2="140" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="834,140 818,133 818,147" fill="#6E7787"/>

    <line x1="760" y1="260" x2="818" y2="260" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="834,260 818,253 818,267" fill="#6E7787"/>

    <!-- Distribution box -->
    <rect x="1020" y="155" width="250" height="90" rx="12" fill="#F1E6FA" stroke="#7B4FA8" stroke-width="2" filter="url(#shadow)"/>
    <text x="1145" y="210" text-anchor="middle" font-size="30" fill="#222">N(μ̂, σ̂²)</text>

    <!-- Arrows: outputs -> distribution -->
    <line x1="906" y1="152" x2="1002" y2="185" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="1020,190 1002,179 999,193" fill="#6E7787"/>

    <line x1="906" y1="248" x2="1002" y2="215" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="1020,210 999,207 1002,221" fill="#6E7787"/>


    <!-- ===== Divider ===== -->
    <line x1="50" y1="420" x2="1450" y2="420" stroke="#ccc" stroke-width="1.2" stroke-dasharray="8,5"/>


    <!-- ===== Panel (b): separate networks ===== -->
    <text x="80" y="468" font-size="27" font-weight="bold" fill="#222">(b) separate networks</text>

    <!-- Input x (top) -->
    <circle cx="130" cy="560" r="42" fill="#E8EEF7" stroke="#5B7CA8" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="569" text-anchor="middle" font-size="29" fill="#222">x</text>

    <!-- Input x (bottom) -->
    <circle cx="130" cy="730" r="42" fill="#E8EEF7" stroke="#5B7CA8" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="739" text-anchor="middle" font-size="29" fill="#222">x</text>

    <!-- Network for mu -->
    <rect x="250" y="510" width="200" height="100" rx="14" fill="#FFF1D6" stroke="#C99A2C" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="553" text-anchor="middle" font-size="25" font-weight="bold" fill="#333">network</text>
    <text x="350" y="578" text-anchor="middle" font-size="25" font-weight="bold" fill="#333">for μ</text>

    <!-- Network for sigma -->
    <rect x="250" y="680" width="200" height="100" rx="14" fill="#FFF1D6" stroke="#C99A2C" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="723" text-anchor="middle" font-size="25" font-weight="bold" fill="#333">network</text>
    <text x="350" y="748" text-anchor="middle" font-size="25" font-weight="bold" fill="#333">for σ</text>

    <!-- Arrows: x -> networks -->
    <line x1="172" y1="560" x2="234" y2="560" stroke="#6E7787" stroke-width="2"/>
    <polygon points="250,560 234,553 234,567" fill="#6E7787"/>

    <line x1="172" y1="730" x2="234" y2="730" stroke="#6E7787" stroke-width="2"/>
    <polygon points="250,730 234,723 234,737" fill="#6E7787"/>

    <!-- z_mu node -->
    <circle cx="570" cy="560" r="36" fill="white" stroke="#444" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="565" y="561" text-anchor="middle" font-size="28" fill="#222">z</text>
    <text x="575" y="573" text-anchor="start" font-size="20" fill="#222">μ</text>

    <!-- z_sigma node -->
    <circle cx="570" cy="730" r="36" fill="white" stroke="#444" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="565" y="731" text-anchor="middle" font-size="28" fill="#222">z</text>
    <text x="575" y="743" text-anchor="start" font-size="20" fill="#222">σ</text>

    <!-- Arrows: networks -> z nodes -->
    <line x1="450" y1="560" x2="518" y2="560" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="534,560 518,553 518,567" fill="#6E7787"/>

    <line x1="450" y1="730" x2="518" y2="730" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="534,730 518,723 518,737" fill="#6E7787"/>

    <!-- r_mu box -->
    <rect x="690" y="538" width="70" height="44" rx="8" fill="#FFF7C2" stroke="#C4A000" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="720" y="566" text-anchor="middle" font-size="26" fill="#222">r</text>
    <text x="730" y="571" text-anchor="start" font-size="19" fill="#222">μ</text>

    <!-- r_sigma box -->
    <rect x="690" y="708" width="70" height="44" rx="8" fill="#FFF7C2" stroke="#C4A000" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="720" y="736" text-anchor="middle" font-size="26" fill="#222">r</text>
    <text x="730" y="741" text-anchor="start" font-size="19" fill="#222">σ</text>

    <!-- Arrows: z -> r boxes -->
    <line x1="606" y1="560" x2="674" y2="560" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="690,560 674,553 674,567" fill="#6E7787"/>

    <line x1="606" y1="730" x2="674" y2="730" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="690,730 674,723 674,737" fill="#6E7787"/>

    <!-- mu-hat output -->
    <circle cx="870" cy="560" r="36" fill="#E8F5E9" stroke="#3F8A52" stroke-width="2" filter="url(#shadow)"/>
    <text x="870" y="569" text-anchor="middle" font-size="28" fill="#222">μ̂(x)</text>

    <!-- sigma-hat output -->
    <circle cx="870" cy="730" r="36" fill="#E8F5E9" stroke="#3F8A52" stroke-width="2" filter="url(#shadow)"/>
    <text x="870" y="739" text-anchor="middle" font-size="28" fill="#222">σ̂(x)</text>

    <!-- Arrows: r -> outputs -->
    <line x1="760" y1="560" x2="818" y2="560" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="834,560 818,553 818,567" fill="#6E7787"/>

    <line x1="760" y1="730" x2="818" y2="730" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="834,730 818,723 818,737" fill="#6E7787"/>

    <!-- Distribution box -->
    <rect x="1020" y="600" width="250" height="90" rx="12" fill="#F1E6FA" stroke="#7B4FA8" stroke-width="2" filter="url(#shadow)"/>
    <text x="1145" y="655" text-anchor="middle" font-size="30" fill="#222">N(μ̂, σ̂²)</text>

    <!-- Arrows: outputs -> distribution -->
    <line x1="906" y1="572" x2="1002" y2="630" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="1020,638 1002,624 999,638" fill="#6E7787"/>

    <line x1="906" y1="718" x2="1002" y2="660" stroke="#6E7787" stroke-width="1.8"/>
    <polygon points="1020,652 999,652 1002,666" fill="#6E7787"/>

  </svg>