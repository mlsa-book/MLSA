<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420"
     font-family="DejaVu Sans, sans-serif">
  <defs>
    <!-- All arrowheads use the same proven geometry: right-pointing triangle.
         orient="auto" rotates them to match the line direction. -->
    <marker id="arr-teal" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#2a9d8f"/>
    </marker>
    <marker id="arr-orange" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#e9a825"/>
    </marker>
    <marker id="arr-gray" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#aaa"/>
    </marker>
    <filter id="shadow-sm">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000018"/>
    </filter>
    <filter id="shadow-sa">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#e9a82520"/>
    </filter>
  </defs>

  <!-- ═══════════ SECTION BACKGROUNDS ═══════════ -->
  <rect x="0" y="0"   width="960" height="135" fill="#f5fefe"/>
  <rect x="0" y="135" width="960" height="285" fill="#fffdf4"/>

  <!-- ═══════════ SECTION LABELS ═══════════ -->
  <text x="14" y="16" font-size="10.5" fill="#6eaaa4" font-weight="700" letter-spacing="1">STANDARD ML PIPELINE</text>
  <text x="14" y="150" font-size="10.5" fill="#c89520" font-weight="700" letter-spacing="1">SURVIVAL ANALYSIS ADAPTATIONS</text>

  <!-- ═══════════ PIPELINE ARROWS ═══════════
       Box right edges: 160, 348, 536, 724, 912
       Box left edges:   20, 208, 396, 584, 772
       Line ends 11px before left edge of next box so arrowhead tip lands on box border.
  -->
  <line x1="160" y1="78" x2="197" y2="78" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr-teal)"/>
  <line x1="348" y1="78" x2="385" y2="78" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr-teal)"/>
  <line x1="536" y1="78" x2="573" y2="78" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr-teal)"/>
  <line x1="724" y1="78" x2="761" y2="78" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr-teal)"/>

  <!-- ═══════════ TEST DATA TRACK ═══════════
       A dashed "highway" below the pipeline boxes carries test X to Predict
       and test Y to Evaluate, bypassing Fit Model.
       Track at y=118.  Vertical stubs rise from y=118 to y=111 (box bottom – 1).
  -->
  <!-- Horizontal track: from under Split right edge (348,118) to under Evaluate left edge (772,118) -->
  <line x1="340" y1="118" x2="842" y2="118" stroke="#2a9d8f" stroke-width="1.3"
        stroke-dasharray="5,3"/>
  <!-- Stub from Split down to track -->
  <line x1="278" y1="110" x2="278" y2="118" stroke="#2a9d8f" stroke-width="1.3"
        stroke-dasharray="5,3"/>
  <!-- Corner to track start -->
  <line x1="278" y1="118" x2="340" y2="118" stroke="#2a9d8f" stroke-width="1.3"
        stroke-dasharray="5,3"/>
  <!-- Stub up into Predict box (x=654) -->
  <line x1="654" y1="118" x2="654" y2="111" stroke="#2a9d8f" stroke-width="1.3"
        stroke-dasharray="5,3" marker-end="url(#arr-teal)"/>
  <!-- Stub up into Evaluate box (x=842) -->
  <line x1="842" y1="118" x2="842" y2="111" stroke="#2a9d8f" stroke-width="1.3"
        stroke-dasharray="5,3" marker-end="url(#arr-teal)"/>
  <!-- Label on track -->
  <text x="494" y="130" text-anchor="middle" font-size="9" fill="#2a9d8f" font-style="italic">test X (→ Predict),  test Y (→ Evaluate)</text>

  <!-- ═══════════ RESAMPLING LOOP ═══════════
       Arc from top of Evaluate box (842, 46) up to peak (560, 24)
       then down to top of Split box (278, 35).
       Path ends 11px above Split box top (46-11=35) so arrowhead tip lands at y=46.
       Final tangent is downward → orient="auto" rotates arr-gray to point down. ✓
  -->
  <path d="M 842 46 Q 842 24 560 24 Q 278 24 278 35"
        fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-gray)"/>
  <text x="560" y="19" text-anchor="middle" font-size="9.5" fill="#aaa" font-style="italic">if resampling</text>

  <!-- ═══════════ PIPELINE BOXES ═══════════ -->

  <!-- Box 1: Data  x: 20–160 -->
  <rect x="20" y="46" width="140" height="64" rx="10"
        fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="90" y="69" text-anchor="middle" font-size="12.5" fill="#1a5f58" font-weight="700">Data</text>
  <line x1="32" y1="75" x2="148" y2="75" stroke="#b0e0da" stroke-width="1"/>
  <text x="90" y="89" text-anchor="middle" font-size="10" fill="#2a9d8f">features X</text>
  <text x="90" y="102" text-anchor="middle" font-size="10" fill="#2a9d8f">outcome (t, δ)</text>

  <!-- Box 2: Split  x: 208–348 -->
  <rect x="208" y="46" width="140" height="64" rx="10"
        fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="278" y="69" text-anchor="middle" font-size="12.5" fill="#1a5f58" font-weight="700">Split</text>
  <line x1="220" y1="75" x2="336" y2="75" stroke="#b0e0da" stroke-width="1"/>
  <text x="278" y="89" text-anchor="middle" font-size="10" fill="#2a9d8f">→ train set</text>
  <text x="278" y="102" text-anchor="middle" font-size="10" fill="#2a9d8f">→ test set (X, Y)</text>

  <!-- Box 3: Fit Model  x: 396–536 -->
  <rect x="396" y="46" width="140" height="64" rx="10"
        fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="466" y="69" text-anchor="middle" font-size="12.5" fill="#1a5f58" font-weight="700">Fit Model</text>
  <line x1="408" y1="75" x2="524" y2="75" stroke="#b0e0da" stroke-width="1"/>
  <text x="466" y="89" text-anchor="middle" font-size="10" fill="#2a9d8f">algorithm on</text>
  <text x="466" y="102" text-anchor="middle" font-size="10" fill="#2a9d8f">train set</text>

  <!-- Box 4: Predict  x: 584–724 -->
  <rect x="584" y="46" width="140" height="64" rx="10"
        fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="654" y="69" text-anchor="middle" font-size="12.5" fill="#1a5f58" font-weight="700">Predict</text>
  <line x1="596" y1="75" x2="712" y2="75" stroke="#b0e0da" stroke-width="1"/>
  <text x="654" y="89" text-anchor="middle" font-size="10" fill="#2a9d8f">model(test X)</text>
  <text x="654" y="102" text-anchor="middle" font-size="10" fill="#2a9d8f">→ ŷ</text>

  <!-- Box 5: Evaluate  x: 772–912 -->
  <rect x="772" y="46" width="140" height="64" rx="10"
        fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="842" y="69" text-anchor="middle" font-size="12.5" fill="#1a5f58" font-weight="700">Evaluate</text>
  <line x1="784" y1="75" x2="900" y2="75" stroke="#b0e0da" stroke-width="1"/>
  <text x="842" y="89" text-anchor="middle" font-size="10" fill="#2a9d8f">ŷ  vs. test Y</text>
  <text x="842" y="102" text-anchor="middle" font-size="10" fill="#2a9d8f">→ performance</text>

  <!-- ═══════════ VERTICAL CONNECTORS ═══════════
       From pipeline box bottom (y=110) to 11px above SA box top (y=240-11=229).
       Arrowhead tip lands at SA box top (y=240).
       Lines are vertical (pointing down) → orient="auto" rotates arr-orange to point down. ✓
  -->
  <line x1="90"  y1="110" x2="90"  y2="229" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <line x1="278" y1="110" x2="278" y2="229" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <line x1="466" y1="110" x2="466" y2="229" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <line x1="654" y1="110" x2="654" y2="229" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <line x1="842" y1="110" x2="842" y2="229" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- ═══════════ SA ADAPTATION BOXES ═══════════
       w=155  h=152  top=240  bottom=392
       x_left = x_center - 77
  -->

  <!-- SA Box 1: Understand Setting  (x_center=90, x: 13–168) -->
  <rect x="13" y="240" width="155" height="152" rx="10"
        fill="#fff9ec" stroke="#e9a825" stroke-width="2" filter="url(#shadow-sa)"/>
  <text x="90" y="261" text-anchor="middle" font-size="11" fill="#8a5f00" font-weight="700">Understand Setting</text>
  <line x1="25" y1="268" x2="156" y2="268" stroke="#f4cc70" stroke-width="1"/>
  <text x="90" y="283" text-anchor="middle" font-size="10" fill="#555">censoring type?</text>
  <text x="90" y="297" text-anchor="middle" font-size="10" fill="#555">truncation?</text>
  <text x="90" y="311" text-anchor="middle" font-size="10" fill="#555">competing risks?</text>
  <text x="90" y="325" text-anchor="middle" font-size="10" fill="#555">recurrent events?</text>
  <line x1="25" y1="335" x2="156" y2="335" stroke="#f4cc70" stroke-width="1"/>
  <text x="90" y="350" text-anchor="middle" font-size="9.5" fill="#c8920a" font-weight="600">Part I  ·  Ch. 4–6</text>
  <text x="90" y="364" text-anchor="middle" font-size="9" fill="#999">shapes all</text>
  <text x="90" y="377" text-anchor="middle" font-size="9" fill="#999">subsequent steps</text>

  <!-- SA Box 2: Adjust Splitting  (x_center=278, x: 201–356) -->
  <rect x="201" y="240" width="155" height="152" rx="10"
        fill="#fff9ec" stroke="#e9a825" stroke-width="2" filter="url(#shadow-sa)"/>
  <text x="278" y="261" text-anchor="middle" font-size="11" fill="#8a5f00" font-weight="700">Adjust Splitting</text>
  <line x1="213" y1="268" x2="344" y2="268" stroke="#f4cc70" stroke-width="1"/>
  <text x="278" y="283" text-anchor="middle" font-size="10" fill="#555">stratify by event /</text>
  <text x="278" y="297" text-anchor="middle" font-size="10" fill="#555">censoring status</text>
  <text x="278" y="311" text-anchor="middle" font-size="10" fill="#555">or competing risk</text>
  <text x="278" y="325" text-anchor="middle" font-size="10" fill="#555">type</text>
  <line x1="213" y1="335" x2="344" y2="335" stroke="#f4cc70" stroke-width="1"/>
  <text x="278" y="350" text-anchor="middle" font-size="9.5" fill="#c8920a" font-weight="600">Part I  ·  Ch. 4, 5</text>

  <!-- SA Box 3: Adapted Training  (x_center=466, x: 389–544) -->
  <rect x="389" y="240" width="155" height="152" rx="10"
        fill="#fff9ec" stroke="#e9a825" stroke-width="2" filter="url(#shadow-sa)"/>
  <text x="466" y="261" text-anchor="middle" font-size="11" fill="#8a5f00" font-weight="700">Adapted Training</text>
  <line x1="401" y1="268" x2="532" y2="268" stroke="#f4cc70" stroke-width="1"/>
  <text x="466" y="283" text-anchor="middle" font-size="10" fill="#555">censoring-aware</text>
  <text x="466" y="297" text-anchor="middle" font-size="10" fill="#555">loss / likelihood</text>
  <text x="466" y="311" text-anchor="middle" font-size="10" fill="#555">truncation-adjusted</text>
  <text x="466" y="325" text-anchor="middle" font-size="10" fill="#555">risk sets</text>
  <line x1="401" y1="335" x2="532" y2="335" stroke="#f4cc70" stroke-width="1"/>
  <text x="466" y="350" text-anchor="middle" font-size="9.5" fill="#c8920a" font-weight="600">Part III  ·  Ch. 13–17</text>

  <!-- SA Box 4: Prediction Type  (x_center=654, x: 577–732) -->
  <rect x="577" y="240" width="155" height="152" rx="10"
        fill="#fff9ec" stroke="#e9a825" stroke-width="2" filter="url(#shadow-sa)"/>
  <text x="654" y="261" text-anchor="middle" font-size="11" fill="#8a5f00" font-weight="700">Prediction Type</text>
  <line x1="589" y1="268" x2="720" y2="268" stroke="#f4cc70" stroke-width="1"/>
  <text x="654" y="283" text-anchor="middle" font-size="10" fill="#555">survival distribution</text>
  <text x="654" y="297" text-anchor="middle" font-size="10" fill="#555">relative risk score</text>
  <text x="654" y="311" text-anchor="middle" font-size="10" fill="#555">survival time</text>
  <text x="654" y="325" text-anchor="middle" font-size="10" fill="#555">(not a point est.)</text>
  <line x1="589" y1="335" x2="720" y2="335" stroke="#f4cc70" stroke-width="1"/>
  <text x="654" y="350" text-anchor="middle" font-size="9.5" fill="#c8920a" font-weight="600">Part I  ·  Ch. 6</text>

  <!-- SA Box 5: SA Evaluation  (x_center=842, x: 765–920) -->
  <rect x="765" y="240" width="155" height="152" rx="10"
        fill="#fff9ec" stroke="#e9a825" stroke-width="2" filter="url(#shadow-sa)"/>
  <text x="842" y="261" text-anchor="middle" font-size="11" fill="#8a5f00" font-weight="700">SA Evaluation</text>
  <line x1="777" y1="268" x2="908" y2="268" stroke="#f4cc70" stroke-width="1"/>
  <text x="842" y="283" text-anchor="middle" font-size="10" fill="#555">test data also has</text>
  <text x="842" y="297" text-anchor="middle" font-size="10" fill="#555">censoring /</text>
  <text x="842" y="311" text-anchor="middle" font-size="10" fill="#555">truncation /</text>
  <text x="842" y="325" text-anchor="middle" font-size="10" fill="#555">competing risks</text>
  <line x1="777" y1="335" x2="908" y2="335" stroke="#f4cc70" stroke-width="1"/>
  <text x="842" y="350" text-anchor="middle" font-size="9.5" fill="#c8920a" font-weight="600">Part II  ·  Ch. 8–11</text>

</svg>