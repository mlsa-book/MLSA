<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 880" font-family="DejaVu Sans">
    <defs>
      <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
      </filter>
    </defs>

    <!-- ===== zone bands ===== -->
    <rect x="100" y="95" width="190" height="650" rx="5" fill="#e8f0fb" stroke="#bcd2f0" filter="url(#sh)"/>
    <rect x="290" y="95" width="430" height="650" rx="5" fill="#e9f5ec" stroke="#b9dec5" filter="url(#sh)"/>
    <rect x="720" y="95" width="150" height="650" rx="5" fill="#e8f0fb" stroke="#bcd2f0" filter="url(#sh)"/>
    <text x="195" y="78" text-anchor="middle" font-size="26" font-weight="bold" fill="#5a6a7a">Unobserved</text>
    <text x="505" y="78" text-anchor="middle" font-size="26" font-weight="bold" fill="#4a7a59">Observation period</text>
    <text x="795" y="78" text-anchor="middle" font-size="26" font-weight="bold" fill="#5a6a7a">Unobserved</text>

    <!-- ============================== ROW 1 — Fully observed (y=170, B=146) ============================== -->
    <g stroke="#34495e" stroke-width="3" fill="none">
      <circle cx="50" cy="138" r="10" fill="#34495e" stroke="none"/>
      <line x1="50" y1="148" x2="50" y2="174"/><line x1="35" y1="159" x2="65" y2="159"/>
      <line x1="50" y1="174" x2="39" y2="190"/><line x1="50" y1="174" x2="61" y2="190"/>
    </g>
    <line x1="330" y1="170" x2="600" y2="170" stroke="#2c3e50" stroke-width="3.6"/>
    <!-- stethoscope @330 -->
    <g stroke="#5a6a7a" stroke-width="2.6" fill="none" stroke-linecap="round"><path d="M 318 104 V 119 Q 318 133 330 133 Q 342 133 342 119 V 104"/><line x1="330" y1="133" x2="330" y2="139"/></g>
    <circle cx="330" cy="143" r="5.5" fill="#5a6a7a"/><circle cx="318" cy="104" r="3" fill="#5a6a7a"/><circle cx="342" cy="104" r="3" fill="#5a6a7a"/>
    <!-- entry bracket @330 -->
    <path d="M 337 153 Q 322 170 337 187" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <!-- thermometer + event @600 -->
    <rect x="596" y="108" width="8" height="26" rx="4" fill="#fff" stroke="#c0392b" stroke-width="2.2"/><circle cx="600" cy="139" r="7" fill="#c0392b"/><line x1="600" y1="136" x2="600" y2="116" stroke="#c0392b" stroke-width="3.5"/>
    <circle cx="600" cy="170" r="9" fill="#2c3e50"/>
    <text x="330" y="212" text-anchor="middle" font-size="26" fill="#555">diagnosed &amp; enrolled</text>
    <text x="600" y="212" text-anchor="middle" font-size="26" fill="#555">dies</text>

    <!-- ============================== ROW 2 — Right-censoring ============================== -->
    <g transform="translate(0,30)">
    <g stroke="#34495e" stroke-width="3" fill="none">
      <circle cx="50" cy="283" r="10" fill="#34495e" stroke="none"/>
      <line x1="50" y1="293" x2="50" y2="319"/><line x1="35" y1="304" x2="65" y2="304"/>
      <line x1="50" y1="319" x2="39" y2="335"/><line x1="50" y1="319" x2="61" y2="335"/>
    </g>
    <line x1="330" y1="315" x2="620" y2="315" stroke="#2c3e50" stroke-width="3.6"/>
    <line x1="620" y1="315" x2="790" y2="315" stroke="#8a94a0" stroke-width="3" stroke-dasharray="10,7"/>
    <!-- stethoscope @330 -->
    <g stroke="#5a6a7a" stroke-width="2.6" fill="none" stroke-linecap="round"><path d="M 318 249 V 264 Q 318 278 330 278 Q 342 278 342 264 V 249"/><line x1="330" y1="278" x2="330" y2="284"/></g>
    <circle cx="330" cy="288" r="5.5" fill="#5a6a7a"/><circle cx="318" cy="249" r="3" fill="#5a6a7a"/><circle cx="342" cy="249" r="3" fill="#5a6a7a"/>
    <!-- entry bracket @330 -->
    <path d="M 337 298 Q 322 315 337 332" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <!-- door/exit + censoring circle @620 -->
    <rect x="605" y="257" width="15" height="34" rx="1.5" fill="none" stroke="#5a6a7a" stroke-width="2.6"/><line x1="619" y1="274" x2="627" y2="274" stroke="#5a6a7a" stroke-width="2.8"/><polygon points="635,274 627,269 627,279" fill="#5a6a7a"/>
    <circle cx="620" cy="315" r="10" fill="#fff" stroke="#2c3e50" stroke-width="4"/>
    <!-- unobserved death (faded) @790 -->
    <g opacity="0.5"><rect x="786" y="253" width="8" height="26" rx="4" fill="#fff" stroke="#c0392b" stroke-width="2.2"/><circle cx="790" cy="284" r="7" fill="#c0392b"/><line x1="790" y1="281" x2="790" y2="261" stroke="#c0392b" stroke-width="3.5"/><circle cx="790" cy="315" r="9" fill="#2c3e50"/></g>
    <text x="330" y="357" text-anchor="middle" font-size="26" fill="#555">diagnosed &amp; enrolled</text>
    <text x="620" y="357" text-anchor="middle" font-size="26" fill="#555">exits study</text>
    <text x="790" y="357" text-anchor="middle" font-size="26" fill="#999">dies</text>

    </g>
    <!-- ============================== ROW 3 — Delayed entry ============================== -->
    <g transform="translate(0,65)">
    <g stroke="#34495e" stroke-width="3" fill="none">
      <circle cx="50" cy="428" r="10" fill="#34495e" stroke="none"/>
      <line x1="50" y1="438" x2="50" y2="464"/><line x1="35" y1="449" x2="65" y2="449"/>
      <line x1="50" y1="464" x2="39" y2="480"/><line x1="50" y1="464" x2="61" y2="480"/>
    </g>
    <line x1="180" y1="460" x2="336" y2="460" stroke="#8a94a0" stroke-width="3" stroke-dasharray="10,7"/>
    <line x1="340" y1="460" x2="600" y2="460" stroke="#2c3e50" stroke-width="3.6"/>
    <!-- stethoscope @180 (diagnosis) -->
    <g stroke="#5a6a7a" stroke-width="2.6" fill="none" stroke-linecap="round"><path d="M 168 394 V 409 Q 168 423 180 423 Q 192 423 192 409 V 394"/><line x1="180" y1="423" x2="180" y2="429"/></g>
    <circle cx="180" cy="433" r="5.5" fill="#5a6a7a"/><circle cx="168" cy="394" r="3" fill="#5a6a7a"/><circle cx="192" cy="394" r="3" fill="#5a6a7a"/>
    <!-- entry bracket @340 -->
    <path d="M 347 443 Q 332 460 347 477" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <!-- thermometer + event @600 -->
    <rect x="596" y="398" width="8" height="26" rx="4" fill="#fff" stroke="#c0392b" stroke-width="2.2"/><circle cx="600" cy="429" r="7" fill="#c0392b"/><line x1="600" y1="426" x2="600" y2="406" stroke="#c0392b" stroke-width="3.5"/>
    <circle cx="600" cy="460" r="9" fill="#2c3e50"/>
    <text x="180" y="502" text-anchor="middle" font-size="26" fill="#555">diagnosed</text>
    <text x="340" y="502" text-anchor="middle" font-size="26" fill="#555">enrolled</text>
    <text x="600" y="502" text-anchor="middle" font-size="26" fill="#555">dies</text>

    </g>
    <!-- ============================== ROW 4 — Selection bias (ghosted) ============================== -->
    <g transform="translate(0,110)">
    <g opacity="0.42">
      <g stroke="#34495e" stroke-width="3" fill="none">
        <circle cx="50" cy="558" r="10" fill="#34495e" stroke="none"/>
        <line x1="50" y1="568" x2="50" y2="594"/><line x1="35" y1="579" x2="65" y2="579"/>
        <line x1="50" y1="594" x2="39" y2="610"/><line x1="50" y1="594" x2="61" y2="610"/>
      </g>
      <line x1="150" y1="590" x2="250" y2="590" stroke="#8a94a0" stroke-width="3" stroke-dasharray="10,7"/>
      <!-- stethoscope @150 -->
      <g stroke="#5a6a7a" stroke-width="2.6" fill="none" stroke-linecap="round"><path d="M 138 524 V 539 Q 138 553 150 553 Q 162 553 162 539 V 524"/><line x1="150" y1="553" x2="150" y2="559"/></g>
      <circle cx="150" cy="563" r="5.5" fill="#5a6a7a"/><circle cx="138" cy="524" r="3" fill="#5a6a7a"/><circle cx="162" cy="524" r="3" fill="#5a6a7a"/>
      <!-- unobserved death (faded) @250 -->
      <rect x="246" y="528" width="8" height="26" rx="4" fill="#fff" stroke="#c0392b" stroke-width="2.2"/><circle cx="250" cy="559" r="7" fill="#c0392b"/><line x1="250" y1="556" x2="250" y2="536" stroke="#c0392b" stroke-width="3.5"/>
      <circle cx="250" cy="590" r="9" fill="#2c3e50"/>
      <text x="150" y="632" text-anchor="middle" font-size="26" fill="#555">diagnosed</text>
      <text x="250" y="632" text-anchor="middle" font-size="26" fill="#555">dies</text>
    </g>

    </g>
    <!-- ===== right-side concept labels ===== -->
    <text x="890" y="178" font-size="26" font-weight="bold" fill="#2c3e50">Fully observed</text>
    <text x="890" y="353" font-size="26" font-weight="bold" fill="#2c3e50">Right-censoring</text>
    <text x="890" y="533" font-size="26" font-weight="bold" fill="#2c3e50">Delayed entry</text>
    <text x="890" y="708" font-size="26" font-weight="bold" fill="#2c3e50">Selection bias</text>
    <path d="M 1120 510 H 1130 V 715 H 1120" fill="none" stroke="#7a8a99" stroke-width="2.6"/>
    <text x="1140" y="603" font-size="25" font-weight="bold" fill="#5a6a7a">Left-</text>
    <text x="1140" y="632" font-size="25" font-weight="bold" fill="#5a6a7a">truncation</text>

    <!-- ===== time axis ===== -->
    <line x1="100" y1="790" x2="856" y2="790" stroke="#2c3e50" stroke-width="3"/>
    <polygon points="872,790 856,798 856,782" fill="#2c3e50"/>
    <text x="505" y="825" text-anchor="middle" font-size="28" font-style="italic" fill="#2c3e50">Time</text>

    <!-- ===== legend ===== -->
    <line x1="230" y1="853" x2="280" y2="853" stroke="#2c3e50" stroke-width="3.6"/>
    <text x="290" y="861" font-size="26" fill="#444">observed / at risk</text>
    <line x1="550" y1="853" x2="600" y2="853" stroke="#8a94a0" stroke-width="3" stroke-dasharray="10,7"/>
    <text x="610" y="861" font-size="26" fill="#444">unobserved</text>
  </svg>