<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 540" width="840" height="540" font-family="DejaVu Sans, sans-serif">
  <defs>
    <filter id="shadow-sm">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000020"/>
    </filter>
    <filter id="shadow-active">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#2a9d8f30"/>
    </filter>
    <filter id="shadow-pred">
      <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#f4a26140"/>
    </filter>

    <!--
      All three arrowhead markers use identical geometry and markerUnits="userSpaceOnUse"
      so they render at the same absolute pixel size regardless of stroke-width.
      refX="0" means the line terminates at the base of the triangle (90° to edge).
      Triangle: base at x=0 (height 9), tip at x=11.
    -->
    <marker id="arr-active" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#2a9d8f"/>
    </marker>
    <marker id="arr-inactive" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#c8c8c8"/>
    </marker>
    <marker id="arr-gold" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#e9a825"/>
    </marker>
  </defs>

  <rect width="840" height="540" fill="none"/>

  <!-- ═══════════ EDGES ═══════════
       Lines stop at arrowhead base (11px before node border).
       marker-end places the arrowhead with its base at the line endpoint.
  -->

  <!-- Root → Manual (ACTIVE) -->
  <line x1="400" y1="100" x2="229" y2="201"
        stroke="#2a9d8f" stroke-width="2.5" marker-end="url(#arr-active)"/>

  <!-- Root → Automatic (inactive) -->
  <line x1="400" y1="100" x2="591" y2="200"
        stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-inactive)"/>

  <!-- Manual → yr<2014 (inactive) -->
  <line x1="220" y1="255" x2="127" y2="351"
        stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-inactive)"/>

  <!-- Manual → yr≥2014 (ACTIVE) — tip targets (322,350), base = tip − 11·unit(0.731,0.681) = (314,343) -->
  <line x1="220" y1="255" x2="314" y2="343"
        stroke="#2a9d8f" stroke-width="2.5" marker-end="url(#arr-active)"/>

  <!-- Auto → Petrol (inactive) -->
  <line x1="600" y1="255" x2="507" y2="351"
        stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-inactive)"/>

  <!-- Auto → Diesel (inactive) -->
  <line x1="600" y1="255" x2="693" y2="351"
        stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-inactive)"/>

  <!-- ═══════════ BRANCH LABELS ═══════════ -->

  <!-- Root → Manual -->
  <rect x="285" y="135" width="72" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="321" y="150" text-anchor="middle" font-size="11.5" fill="#1a7a6e" font-weight="600">Manual</text>

  <!-- Root → Automatic -->
  <rect x="447" y="135" width="82" height="22" rx="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <text x="488" y="150" text-anchor="middle" font-size="11.5" fill="#b8b8b8">Automatic</text>

  <!-- Manual → yr<2014 -->
  <rect x="137" y="290" width="76" height="22" rx="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <text x="175" y="305" text-anchor="middle" font-size="11" fill="#b8b8b8">year &lt; 2014</text>

  <!-- Manual → yr≥2014 -->
  <rect x="231" y="290" width="76" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="269" y="305" text-anchor="middle" font-size="11" fill="#1a7a6e" font-weight="600">year ≥ 2014</text>

  <!-- Auto → Petrol -->
  <rect x="529" y="290" width="52" height="22" rx="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <text x="555" y="305" text-anchor="middle" font-size="11" fill="#b8b8b8">Petrol</text>

  <!-- Auto → Diesel -->
  <rect x="619" y="290" width="52" height="22" rx="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <text x="645" y="305" text-anchor="middle" font-size="11" fill="#b8b8b8">Diesel</text>

  <!-- ═══════════ INTERNAL NODES ═══════════ -->

  <!-- ROOT (active) -->
  <rect x="315" y="48" width="170" height="52" rx="11" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2.5" filter="url(#shadow-active)"/>
  <text x="400" y="70" text-anchor="middle" font-size="12.5" fill="#333" font-weight="600">Transmission type?</text>
  <text x="400" y="88" text-anchor="middle" font-size="11" fill="#2a9d8f">Manual  |  Automatic</text>

  <!-- MANUAL / Registration year node (active) -->
  <rect x="135" y="205" width="170" height="50" rx="11" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2.5" filter="url(#shadow-active)"/>
  <text x="220" y="226" text-anchor="middle" font-size="12.5" fill="#333" font-weight="600">Registration year?</text>
  <text x="220" y="244" text-anchor="middle" font-size="11" fill="#2a9d8f">&lt; 2014  |  ≥ 2014</text>

  <!-- AUTOMATIC node (inactive) -->
  <rect x="515" y="205" width="170" height="50" rx="11" fill="#f2f2f2" stroke="#d0d0d0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="600" y="226" text-anchor="middle" font-size="12.5" fill="#c0c0c0" font-weight="600">Fuel type?</text>
  <text x="600" y="244" text-anchor="middle" font-size="11" fill="#d0d0d0">Petrol  |  Diesel</text>

  <!-- ═══════════ TERMINAL NODES ═══════════ -->

  <!-- yr<2014 (inactive) -->
  <rect x="57" y="358" width="126" height="70" rx="11" fill="#f2f2f2" stroke="#d0d0d0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="120" y="381" text-anchor="middle" font-size="13" fill="#c8c8c8" font-weight="700">$3.4K</text>
  <line x1="68" y1="387" x2="172" y2="387" stroke="#e4e4e4" stroke-width="1"/>
  <text x="120" y="401" text-anchor="middle" font-size="10.5" fill="#d0d0d0">year &lt; 2014</text>
  <text x="120" y="416" text-anchor="middle" font-size="10.5" fill="#d0d0d0">Manual</text>

  <!-- yr≥2014 — PREDICTION (highlighted) -->
  <rect x="252" y="350" width="140" height="82" rx="12" fill="#fff9ec" stroke="#e9a825" stroke-width="3" filter="url(#shadow-pred)"/>
  <text x="322" y="376" text-anchor="middle" font-size="15" fill="#c0692e" font-weight="800">$7.6K</text>
  <line x1="264" y1="382" x2="380" y2="382" stroke="#f4c261" stroke-width="1"/>
  <text x="322" y="397" text-anchor="middle" font-size="10.5" fill="#888">year ≥ 2014</text>
  <text x="322" y="411" text-anchor="middle" font-size="10.5" fill="#888">Manual</text>
  <text x="322" y="426" text-anchor="middle" font-size="10.5" fill="#e9a825" font-weight="700">&#9654; Prediction</text>

  <!-- Petrol (inactive) -->
  <rect x="437" y="358" width="126" height="70" rx="11" fill="#f2f2f2" stroke="#d0d0d0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="500" y="381" text-anchor="middle" font-size="13" fill="#c8c8c8" font-weight="700">$10K</text>
  <line x1="448" y1="387" x2="552" y2="387" stroke="#e4e4e4" stroke-width="1"/>
  <text x="500" y="401" text-anchor="middle" font-size="10.5" fill="#d0d0d0">Automatic</text>
  <text x="500" y="416" text-anchor="middle" font-size="10.5" fill="#d0d0d0">Petrol</text>

  <!-- Diesel (inactive) -->
  <rect x="637" y="358" width="126" height="70" rx="11" fill="#f2f2f2" stroke="#d0d0d0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="700" y="381" text-anchor="middle" font-size="13" fill="#c8c8c8" font-weight="700">$26K</text>
  <line x1="648" y1="387" x2="752" y2="387" stroke="#e4e4e4" stroke-width="1"/>
  <text x="700" y="401" text-anchor="middle" font-size="10.5" fill="#d0d0d0">Automatic</text>
  <text x="700" y="416" text-anchor="middle" font-size="10.5" fill="#d0d0d0">Diesel</text>

  <!-- ═══════════ NEW OBSERVATION CARD ═══════════ -->
  <rect x="22" y="22" width="200" height="105" rx="9" fill="#fffde8" stroke="#e9a825" stroke-width="1.8" filter="url(#shadow-sm)"/>
  <text x="33" y="42" font-size="11.5" fill="#555" font-weight="700">New observation</text>
  <line x1="33" y1="48" x2="211" y2="48" stroke="#f0cc44" stroke-width="1"/>
  <text x="33"  y="64" font-size="11" fill="#666">Transmission:</text>
  <text x="133" y="64" font-size="11" fill="#1a7a6e" font-weight="700">Manual</text>
  <text x="33"  y="80" font-size="11" fill="#bbb">Fuel:</text>
  <text x="133" y="80" font-size="11" fill="#bbb">Diesel</text>
  <text x="33"  y="96" font-size="11" fill="#666">Year:</text>
  <text x="133" y="96" font-size="11" fill="#1a7a6e" font-weight="700">2015</text>
  <text x="33"  y="114" font-size="9.5" fill="#bbb" font-style="italic">(fuel not used on this path)</text>

  <!-- Connector: card → root (gold, same arrowhead style) -->
  <path d="M 222 62 Q 282 40 312 70" stroke="#e9a825" stroke-width="1.5"
        stroke-dasharray="4,3" fill="none" marker-end="url(#arr-gold)"/>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="645" y="18" width="180" height="80" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.2" filter="url(#shadow-sm)"/>
  <text x="660" y="36" font-size="11" fill="#555" font-weight="700">Legend</text>
  <!-- active -->
  <line x1="660" y1="51" x2="690" y2="51" stroke="#2a9d8f" stroke-width="2.5" marker-end="url(#arr-active)"/>
  <text x="710" y="55" font-size="10.5" fill="#444">Active path</text>
  <!-- inactive -->
  <line x1="660" y1="68" x2="690" y2="68" stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-inactive)"/>
  <text x="710" y="72" font-size="10.5" fill="#888">Inactive path</text>
  <!-- prediction -->
  <rect x="657" y="78" width="14" height="12" rx="2" fill="#fff9ec" stroke="#e9a825" stroke-width="2"/>
  <text x="710" y="88" font-size="10.5" fill="#888">Prediction node</text>

</svg>