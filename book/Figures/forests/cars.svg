<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" font-family="DejaVu Sans, sans-serif">
  <defs>
    <filter id="shadow-sm">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000020"/>
    </filter>
    <filter id="shadow-node">
      <feDropShadow dx="1" dy="2" stdDeviation="3.5" flood-color="#2a9d8f28"/>
    </filter>
    <!-- Single arrow style — same for all edges -->
    <marker id="arr" markerWidth="11" markerHeight="9"
            refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,9 L11,4.5 z" fill="#2a9d8f"/>
    </marker>
  </defs>

  <rect width="720" height="430" fill="none"/>

  <!-- ═══════════ EDGES ═══════════ -->

  <line x1="360" y1="91"  x2="205" y2="160" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="91"  x2="515" y2="160" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="195" y1="216" x2="108" y2="291" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="195" y1="216" x2="282" y2="291" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="525" y1="216" x2="467" y2="289" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="525" y1="216" x2="612" y2="291" stroke="#2a9d8f" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════ BRANCH LABELS ═══════════ -->

  <!-- Root → Year? : "Manual" -->
  <rect x="251" y="113" width="68" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="285" y="128" text-anchor="middle" font-size="11.5" fill="#1a7a6e" font-weight="600">Manual</text>

  <!-- Root → Fuel? : "Automatic" -->
  <rect x="394" y="113" width="82" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="435" y="128" text-anchor="middle" font-size="11.5" fill="#1a7a6e" font-weight="600">Automatic</text>

  <!-- Year? → $3.4K : "< 2014" -->
  <rect x="116" y="246" width="64" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="148" y="261" text-anchor="middle" font-size="11" fill="#1a7a6e" font-weight="600">&lt; 2014</text>

  <!-- Year? → $7.6K : "≥ 2014" -->
  <rect x="210" y="246" width="64" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="242" y="261" text-anchor="middle" font-size="11" fill="#1a7a6e" font-weight="600">≥ 2014</text>

  <!-- Fuel? → $10K : "Petrol" -->
  <rect x="466" y="246" width="52" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="492" y="261" text-anchor="middle" font-size="11" fill="#1a7a6e" font-weight="600">Petrol</text>

  <!-- Fuel? → $25.9K : "Diesel" -->
  <rect x="546" y="246" width="52" height="22" rx="5" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="572" y="261" text-anchor="middle" font-size="11" fill="#1a7a6e" font-weight="600">Diesel</text>

  <!-- ═══════════ INTERNAL NODES ═══════════ -->

  <!-- ROOT: Transmission type? -->
  <rect x="283" y="39" width="155" height="52" rx="11" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2.5" filter="url(#shadow-node)"/>
  <text x="360" y="61" text-anchor="middle" font-size="12" fill="#333" font-weight="700">Transmission type?</text>
  <text x="360" y="79" text-anchor="middle" font-size="10.5" fill="#2a9d8f">Manual  |  Automatic</text>

  <!-- Year? -->
  <rect x="118" y="164" width="155" height="52" rx="11" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-node)"/>
  <text x="195" y="186" text-anchor="middle" font-size="12" fill="#333" font-weight="700">Registration year?</text>
  <text x="195" y="204" text-anchor="middle" font-size="10.5" fill="#2a9d8f">&lt; 2014  |  ≥ 2014</text>

  <!-- Fuel? -->
  <rect x="448" y="164" width="155" height="52" rx="11" fill="#e0f4f2" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-node)"/>
  <text x="525" y="186" text-anchor="middle" font-size="12" fill="#333" font-weight="700">Fuel type?</text>
  <text x="525" y="204" text-anchor="middle" font-size="10.5" fill="#2a9d8f">Petrol  |  Diesel</text>

  <!-- ═══════════ TERMINAL NODES ═══════════ -->
  <!-- Style: white fill, teal border, price bold+large, divider, n + % small -->

  <!-- $3.40K  n=1269  45% -->
  <rect x="30" y="298" width="140" height="82" rx="11" fill="white" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="100" y="323" text-anchor="middle" font-size="15" fill="#1a5f58" font-weight="800">$3.4K</text>
  <line x1="42" y1="330" x2="158" y2="330" stroke="#d0ece9" stroke-width="1"/>
  <text x="100" y="347" text-anchor="middle" font-size="10.5" fill="#555">n = 1,269</text>
  <text x="100" y="363" text-anchor="middle" font-size="10.5" fill="#555">45% of data</text>

  <!-- $7.64K  n=1280  45% -->
  <rect x="220" y="298" width="140" height="82" rx="11" fill="white" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="290" y="323" text-anchor="middle" font-size="15" fill="#1a5f58" font-weight="800">$7.6K</text>
  <line x1="232" y1="330" x2="348" y2="330" stroke="#d0ece9" stroke-width="1"/>
  <text x="290" y="347" text-anchor="middle" font-size="10.5" fill="#555">n = 1,280</text>
  <text x="290" y="363" text-anchor="middle" font-size="10.5" fill="#555">45% of data</text>

  <!-- $9.98K  n=129  5% -->
  <rect x="390" y="298" width="140" height="82" rx="11" fill="white" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="460" y="323" text-anchor="middle" font-size="15" fill="#1a5f58" font-weight="800">$10K</text>
  <line x1="402" y1="330" x2="518" y2="330" stroke="#d0ece9" stroke-width="1"/>
  <text x="460" y="347" text-anchor="middle" font-size="10.5" fill="#555">n = 129</text>
  <text x="460" y="363" text-anchor="middle" font-size="10.5" fill="#555">5% of data</text>

  <!-- $25.86K  n=172  6% -->
  <rect x="550" y="298" width="140" height="82" rx="11" fill="white" stroke="#2a9d8f" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="620" y="323" text-anchor="middle" font-size="15" fill="#1a5f58" font-weight="800">$26K</text>
  <line x1="562" y1="330" x2="678" y2="330" stroke="#d0ece9" stroke-width="1"/>
  <text x="620" y="347" text-anchor="middle" font-size="10.5" fill="#555">n = 172</text>
  <text x="620" y="363" text-anchor="middle" font-size="10.5" fill="#555">6% of data</text>

</svg>